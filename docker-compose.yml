# SprintIQ local stack. Brings up Postgres (+pgvector) and Redis, and optionally
# the API (which runs `prisma migrate deploy` then boots). For day-to-day dev you
# can run just the datastores here and run the app on the host with `npm run start:dev`.
#
#   docker compose up -d postgres redis        # datastores only (recommended for dev)
#   docker compose up -d postgres pgadmin      # DB + pgAdmin (http://localhost:5050)
#   docker compose up -d                        # full stack incl. api
#
# See docs/runbooks/LOCAL-RUN.md.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sprintiq
      POSTGRES_PASSWORD: sprintiq
      POSTGRES_DB: sprintiq
    ports:
      - '5432:5432'
    volumes:
      - sprintiq_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sprintiq -d sprintiq']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8.12
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sprintiq.io
      PGADMIN_DEFAULT_PASSWORD: admin
      # Desktop mode: skip the pgAdmin login + master password for local dev.
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sprintiq_pgadmin:/var/lib/pgadmin
      # Pre-register the "SprintIQ Postgres" server (host = the postgres service).
      - ./deploy/pgadmin/servers.json:/pgadmin4/servers.json:ro

  api:
    build: ./backend
    environment:
      APP_ROLE: api
      NODE_ENV: development
      PORT: '3000'
      DATABASE_URL: postgresql://sprintiq:sprintiq@postgres:5432/sprintiq?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret
      PROVISIONING_TOKEN: dev-provision-token
      GITHUB_WEBHOOK_SECRET: dev-webhook-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

volumes:
  sprintiq_pg:
  sprintiq_pgadmin:
